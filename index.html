<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEET Prep Ledger | Cloud Sync & Timer</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0b0f19;
            --card: #161b22;
            --accent: #58a6ff;
            --text: #c9d1d9;
            --subtext: #8b949e;
            --border: #30363d;
            --save-color: #238636;
            --edit-color: #9e6a03;
            --high: #3fb950;
            --norm: #d29922;
            --low: #f85149;
            /* Timer Colors */
            --glass: rgba(0, 0, 0, 0.85);
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* AUTH SCREEN STYLE */
        #authScreen { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; margin-top: 50px; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; background: #0d1117; border: 1px solid var(--border); color: white; border-radius: 6px; box-sizing: border-box; }

        /* MAIN APP UI */
        #appUI { display: none; width: 100%; max-width: 650px; }

        .controls, .statement-controls {
            margin-bottom: 20px; background: var(--card); padding: 15px; border: 1px solid var(--border); border-radius: 8px; display: flex; gap: 15px; align-items: center;
        }

        .marksheet { background: var(--card); padding: 40px; border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative;}
        .header { text-align: center; border-bottom: 1px solid var(--border); margin-bottom: 30px; padding-bottom: 10px; }
        .header h1 { color: var(--accent); margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }

        .section { margin-bottom: 25px; }
        .label { font-weight: bold; color: var(--subtext); font-size: 0.75rem; display: block; text-transform: uppercase; margin-bottom: 10px; }

        .grade-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #0d1117; padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .grade-option { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px; border-radius: 6px; transition: 0.2s; border: 1px solid transparent; }
        .grade-option:hover { background: #21262d; border-color: var(--border); }
        .grade-option input { accent-color: var(--accent); width: 18px; height: 18px; }

        .field-input { width: 100%; border: none; border-bottom: 1px solid var(--border); font-size: 1.1rem; padding: 12px 0; background: transparent; color: var(--text); outline: none; font-family: 'Consolas', monospace; }
        .btn-group { margin-top: 30px; display: flex; gap: 10px; justify-content: flex-end; }
        button { padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }

        /* --- POMODORO TIMER OVERLAY --- */
        #pomo-overlay {
            position: fixed; bottom: 90px; right: 20px; width: 320px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px; padding: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); display: none; z-index: 1000; text-align: center;
        }
        .pomo-display { font-size: 3.5rem; font-weight: 900; margin: 15px 0; color: #fff; font-variant-numeric: tabular-nums; }
        .pomo-inputs { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .pomo-inputs input { width: 50px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 8px; color: #fff; text-align: center; padding: 5px; }
        
        /* Floating Button */
        #pomo-toggle {
            position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px;
            background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.4); z-index: 1001;
        }

        #statementArea { display: none; width: 100%; max-width: 900px; background: #0d1117; padding: 40px; border: 2px solid var(--border); margin-top: 40px; color: #fff; }
        .bank-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .bank-table th, .bank-table td { border: 1px solid var(--border); padding: 12px; text-align: left; font-size: 0.85rem; }

        @media all and (display-mode: picture-in-picture) {
            body { background: #000; }
            #pomo-overlay { position: static; display: block; border: none; backdrop-filter: none; width: 100%; padding: 0; background: transparent; }
            #appUI, #pomo-toggle, #pip-btn { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="authScreen">
        <h2 style="color:var(--accent)">NEET LEDGER ACCESS</h2>
        <input type="email" id="email" class="auth-input" placeholder="Email Address">
        <input type="password" id="password" class="auth-input" placeholder="Password">
        <button onclick="handleAuth('login')" style="background:var(--accent); color:black; width: 100%; margin-bottom: 10px;">LOGIN</button>
        <button onclick="handleAuth('signup')" style="background:transparent; color:var(--text); border:1px solid var(--border); width: 100%;">CREATE ACCOUNT</button>
    </div>

    <div id="appUI">
        <button class="btn-logout" onclick="logout()" style="background:transparent; color:var(--low); border: 1px solid var(--low); float:right; padding:5px 10px;">LOGOUT</button>
        
        <div class="controls">
            <label>Current Date :</label>
            <input type="date" id="currentDate" onchange="loadFromCloud()" style="background:#0d1117; color:white; border:1px solid var(--border); padding:5px; border-radius:5px; color-scheme:dark;">
        </div>

        <div class="marksheet">
            <div class="header"><h1>NEET PREP LEDGER</h1></div>
            <div class="section">
                <span class="label">Daily Goal</span>
                <input type="checkbox" id="workStatus"> <b>All Topics Completed</b>
            </div>
            <div class="section">
                <span class="label">Syllabus Mastery</span>
                <div class="grade-container">
                    <label class="grade-option"><input type="radio" name="perfGrade" value="Expert"> High</label>
                    <label class="grade-option"><input type="radio" name="perfGrade" value="Good"> Normal</label>
                    <label class="grade-option"><input type="radio" name="perfGrade" value="Weak"> Low</label>
                </div>
            </div>
            <div class="section">
                <span class="label">Topics Covered</span>
                <textarea id="streamNotes" class="field-input" rows="5" placeholder="Topics..."></textarea>
            </div>
            <div class="btn-group">
                <button id="saveBtn" onclick="saveToCloud()" style="background:var(--save-color); color:white;">SAVE CLOUD</button>
                <button id="editBtn" onclick="enableWriting()" style="background:var(--edit-color); color:white; display:none;">EDIT</button>
            </div>
        </div>
    </div>

    <div id="pomo-overlay">
        <h3 style="margin:0; font-size:0.8rem; letter-spacing:2px; color:var(--accent)">FOCUS TIMER</h3>
        <div class="pomo-inputs">
            <input type="number" id="ph" value="0">
            <input type="number" id="pm" value="25">
        </div>
        <div class="pomo-display" id="pDisplay">00:25:00</div>
        <div style="display:flex; gap:10px;">
            <button onclick="togglePomo()" id="pBtn" style="flex:1; background:#fff; color:#000;">START</button>
            <button onclick="resetPomo()" style="flex:1; background:rgba(255,255,255,0.1); color:#fff;">RESET</button>
        </div>
        <button id="pip-btn" onclick="startPiP()" style="width:100%; margin-top:15px; background:var(--glass); border:1px solid var(--border); color:#888; font-size:0.7rem;">POP OUT (PiP)</button>
    </div>

    <div id="pomo-toggle" onclick="toggleTimerVisibility()">
        <span style="font-size:24px;">⏱️</span>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyCa0bKCKqoWXMfuvg0OGBldGxHGczbQUFM",
            authDomain: "neet-ledger.firebaseapp.com",
            projectId: "neet-ledger",
            storageBucket: "neet-ledger.firebasestorage.app",
            messagingSenderId: "350923661650",
            appId: "1:350923661650:web:0a3f8ab66b726419b55a8b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- AUTH & LEDGER LOGIC ---
        function handleAuth(t) {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            t === 'signup' ? auth.createUserWithEmailAndPassword(e,p) : auth.signInWithEmailAndPassword(e,p);
        }
        auth.onAuthStateChanged(u => {
            document.getElementById('authScreen').style.display = u ? 'none' : 'block';
            document.getElementById('appUI').style.display = u ? 'block' : 'none';
            if(u) { document.getElementById('currentDate').valueAsDate = new Date(); loadFromCloud(); }
        });
        function logout() { auth.signOut(); }

        async function saveToCloud() {
            const d = document.getElementById('currentDate').value;
            const p = document.querySelector('input[name="perfGrade"]:checked')?.value || "N/A";
            await db.collection("global_logs").doc(d).set({
                completed: document.getElementById('workStatus').checked,
                performance: p,
                notes: document.getElementById('streamNotes').value
            });
            alert("Saved!");
        }

        async function loadFromCloud() {
            const d = document.getElementById('currentDate').value;
            const doc = await db.collection("global_logs").doc(d).get();
            if(doc.exists) {
                const data = doc.data();
                document.getElementById('workStatus').checked = data.completed;
                document.getElementById('streamNotes').value = data.notes;
                document.getElementsByName('perfGrade').forEach(r => r.checked = r.value === data.performance);
            }
        }

        // --- POMODORO TIMER LOGIC ---
        let pSecs = 1500, pLoop = null, pRunning = false;

        function toggleTimerVisibility() {
            const o = document.getElementById('pomo-overlay');
            o.style.display = o.style.display === 'block' ? 'none' : 'block';
        }

        function refreshPDisplay() {
            const h = Math.floor(pSecs/3600), m = Math.floor((pSecs%3600)/60), s = pSecs%60;
            document.getElementById('pDisplay').textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }

        function togglePomo() {
            const btn = document.getElementById('pBtn');
            if(pRunning) {
                clearInterval(pLoop); pRunning = false; btn.textContent = "RESUME";
            } else {
                if(!pLoop && pSecs === 1500) {
                    pSecs = (parseInt(document.getElementById('ph').value)||0)*3600 + (parseInt(document.getElementById('pm').value)||0)*60;
                }
                pRunning = true; btn.textContent = "PAUSE";
                pLoop = setInterval(() => {
                    if(pSecs > 0) { pSecs--; refreshPDisplay(); }
                    else { clearInterval(pLoop); alert("Study Session Complete!"); resetPomo(); }
                }, 1000);
            }
        }

        function resetPomo() {
            clearInterval(pLoop); pLoop = null; pRunning = false;
            pSecs = (parseInt(document.getElementById('ph').value)||0)*3600 + (parseInt(document.getElementById('pm').value)||0)*60;
            document.getElementById('pBtn').textContent = "START";
            refreshPDisplay();
        }

        async function startPiP() {
            if(!window.documentPictureInPicture) return alert("Use Chrome/Edge");
            const overlay = document.getElementById('pomo-overlay');
            const pipW = await window.documentPictureInPicture.requestWindow({ width: 340, height: 400 });
            
            const style = document.createElement('style');
            style.textContent = Array.from(document.styleSheets[0].cssRules).map(r => r.cssText).join('');
            pipW.document.head.appendChild(style);
            
            pipW.document.body.append(overlay);
            pipW.addEventListener("pagehide", () => {
                document.body.append(overlay);
                overlay.style.display = 'none'; // Hide when returning
            });
        }
    </script>
</body>
</html>
