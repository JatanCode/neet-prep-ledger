<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEET Ledger | Restore & Fix</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg: #0b0f19; --card: #161b22; --accent: #58a6ff;
            --text: #c9d1d9; --subtext: #8b949e; --border: #30363d;
            --save-color: #238636; --edit-color: #9e6a03; --low: #f85149;
            --glass: rgba(0, 0, 0, 0.85);
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* AUTH SCREEN */
        #authScreen { background: var(--card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; margin-top: 50px; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; background: #0d1117; border: 1px solid var(--border); color: white; border-radius: 6px; box-sizing: border-box; }

        /* MAIN UI */
        #appUI { display: none; width: 100%; max-width: 650px; }
        .controls { margin-bottom: 20px; background: var(--card); padding: 15px; border: 1px solid var(--border); border-radius: 8px; display: flex; gap: 15px; align-items: center; }

        .marksheet { background: var(--card); padding: 40px; border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { text-align: center; border-bottom: 1px solid var(--border); margin-bottom: 30px; padding-bottom: 10px; }
        .header h1 { color: var(--accent); margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }

        .section { margin-bottom: 25px; }
        .label { font-weight: bold; color: var(--subtext); font-size: 0.75rem; display: block; text-transform: uppercase; margin-bottom: 10px; }

        .grade-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #0d1117; padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .grade-option { display: flex; align-items: center; gap: 10px; cursor: pointer; padding: 10px; border-radius: 6px; transition: 0.2s; border: 1px solid transparent; }
        .grade-option:hover { background: #21262d; border-color: var(--border); }

        .field-input { width: 100%; border: none; border-bottom: 1px solid var(--border); font-size: 1.1rem; padding: 12px 0; background: transparent; color: var(--text); outline: none; font-family: 'Consolas', monospace; }
        .btn-group { margin-top: 30px; display: flex; gap: 10px; justify-content: flex-end; }
        button { padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* --- POMODORO OVERLAY --- */
        #pomo-overlay {
            position: fixed; bottom: 90px; right: 20px; width: 320px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px; padding: 25px; display: none; z-index: 1000; text-align: center;
        }
        .pomo-display { font-size: 3.5rem; font-weight: 900; margin: 10px 0; color: #fff; font-variant-numeric: tabular-nums; }
        #pomo-toggle { position: fixed; bottom: 20px; right: 20px; width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 1001; }
        
        @media all and (display-mode: picture-in-picture) {
            body { background: #000; }
            #pomo-overlay { position: static; display: block; border: none; width: 100%; padding: 0; background: transparent; }
            #appUI, #pomo-toggle { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="authScreen">
        <h2 style="color:var(--accent)">NEET LEDGER ACCESS</h2>
        <input type="email" id="email" class="auth-input" placeholder="Email Address">
        <input type="password" id="password" class="auth-input" placeholder="Password">
        <button onclick="handleAuth('login')" style="background:var(--accent); color:black; width: 100%;">LOGIN</button>
    </div>

    <div id="appUI">
        <button onclick="logout()" style="background:transparent; color:var(--low); border: 1px solid var(--low); float:right; padding:5px 10px; font-size:0.7rem;">LOGOUT</button>
        
        <div class="controls">
            <label>Date Selector:</label>
            <input type="date" id="currentDate" onchange="loadFromCloud()" style="background:#0d1117; color:white; border:1px solid var(--border); padding:5px; color-scheme:dark;">
        </div>

        <div class="marksheet">
            <div class="header"><h1>NEET PREP JOURNEY LEDGER</h1></div>

            <div class="section">
                <span class="label">Date of Revision</span>
                <input type="text" id="displayDate" class="field-input" readonly>
            </div>

            <div class="section">
                <span class="label">Daily Goal Status</span>
                <input type="checkbox" id="workStatus"> <b>All Topics Completed</b>
            </div>

            <div class="section">
                <span class="label">Syllabus Mastery Level</span>
                <div class="grade-container">
                    <label class="grade-option"><input type="radio" name="perfGrade" value="Expert"> High</label>
                    <label class="grade-option"><input type="radio" name="perfGrade" value="Good"> Normal</label>
                    <label class="grade-option"><input type="radio" name="perfGrade" value="Weak"> Low</label>
                    <label class="grade-option"><input type="radio" name="perfGrade" value="No Progress"> No Progress</label>
                </div>
            </div>

            <div class="section">
                <span class="label">Topics Covered</span>
                <textarea id="streamNotes" class="field-input" rows="5" placeholder="e.g. Bio: Genetics..."></textarea>
            </div>

            <div class="btn-group">
                <button id="deleteBtn" onclick="deleteFromCloud()" style="background:var(--low); color:white; display:none;">DELETE</button>
                <button id="editBtn" onclick="enableWriting()" style="background:var(--edit-color); color:white; display:none;">EDIT</button>
                <button id="saveBtn" onclick="saveToCloud()" style="background:var(--save-color); color:white;">SAVE TO CLOUD</button>
            </div>
        </div>
    </div>

    <div id="pomo-overlay">
        <h3 style="margin:0; font-size:0.7rem; color:var(--accent)">FOCUS TIMER</h3>
        <div class="pomo-display" id="pDisplay">00:25:00</div>
        <button onclick="togglePomo()" id="pBtn" style="background:#fff; color:#000; width:100%; padding:10px; border-radius:10px;">START</button>
        <button id="pip-btn" onclick="startPiP()" style="width:100%; margin-top:10px; background:none; color:#888; border:1px solid #333; font-size:0.7rem; padding:5px;">POP OUT</button>
    </div>

    <div id="pomo-toggle" onclick="toggleTimerVisibility()"><span>⏱️</span></div>

    <script>
        // --- FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCa0bKCKqoWXMfuvg0OGBldGxHGczbQUFM",
            authDomain: "neet-ledger.firebaseapp.com",
            projectId: "neet-ledger",
            storageBucket: "neet-ledger.firebasestorage.app",
            messagingSenderId: "350923661650",
            appId: "1:350923661650:web:0a3f8ab66b726419b55a8b"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        function handleAuth(t) {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(e, p);
        }
        auth.onAuthStateChanged(u => {
            document.getElementById('authScreen').style.display = u ? 'none' : 'block';
            document.getElementById('appUI').style.display = u ? 'block' : 'none';
            if(u) { document.getElementById('currentDate').valueAsDate = new Date(); loadFromCloud(); }
        });
        function logout() { auth.signOut(); }

        // --- CLOUD LOGIC ---
        async function saveToCloud() {
            const d = document.getElementById('currentDate').value;
            const p = document.querySelector('input[name="perfGrade"]:checked')?.value || "N/A";
            await db.collection("global_logs").doc(d).set({
                completed: document.getElementById('workStatus').checked,
                performance: p,
                notes: document.getElementById('streamNotes').value
            });
            alert("Cloud Synced!");
            disableWriting();
        }

        async function loadFromCloud() {
            const d = document.getElementById('currentDate').value;
            // Restore Date display formatting
            const parts = d.split('-');
            document.getElementById('displayDate').value = `${parts[2]}-${parts[1]}-${parts[0]}`;

            const doc = await db.collection("global_logs").doc(d).get();
            if(doc.exists) {
                const data = doc.data();
                document.getElementById('workStatus').checked = data.completed;
                document.getElementById('streamNotes').value = data.notes;
                
                // FIXED: Correctly check the radio button
                const radios = document.getElementsByName('perfGrade');
                radios.forEach(r => {
                    r.checked = (r.value === data.performance);
                });

                disableWriting();
                document.getElementById('deleteBtn').style.display = "inline-block";
            } else {
                document.getElementById('workStatus').checked = false;
                document.getElementById('streamNotes').value = "";
                document.getElementsByName('perfGrade').forEach(r => r.checked = false);
                enableWriting();
                document.getElementById('deleteBtn').style.display = "none";
                document.getElementById('editBtn').style.display = "none";
            }
        }

        async function deleteFromCloud() {
            const d = document.getElementById('currentDate').value;
            if(confirm("Delete this entry?")) {
                await db.collection("global_logs").doc(d).delete();
                loadFromCloud();
            }
        }

        function enableWriting() {
            document.getElementById('streamNotes').readOnly = false;
            document.getElementById('workStatus').disabled = false;
            document.getElementsByName('perfGrade').forEach(r => r.disabled = false);
            document.getElementById('saveBtn').style.display = "inline-block";
            document.getElementById('editBtn').style.display = "none";
        }

        function disableWriting() {
            document.getElementById('streamNotes').readOnly = true;
            document.getElementById('workStatus').disabled = true;
            document.getElementsByName('perfGrade').forEach(r => r.disabled = true);
            document.getElementById('saveBtn').style.display = "none";
            document.getElementById('editBtn').style.display = "inline-block";
        }

        // --- TIMER ---
        let pSecs = 1500, pLoop = null;
        function toggleTimerVisibility() {
            const o = document.getElementById('pomo-overlay');
            o.style.display = o.style.display === 'block' ? 'none' : 'block';
        }
        function togglePomo() {
            const btn = document.getElementById('pBtn');
            if(pLoop) { clearInterval(pLoop); pLoop = null; btn.textContent = "RESUME"; }
            else {
                btn.textContent = "PAUSE";
                pLoop = setInterval(() => {
                    if(pSecs > 0) { 
                        pSecs--; 
                        const m = Math.floor(pSecs/60), s = pSecs%60;
                        document.getElementById('pDisplay').textContent = `00:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                    } else { clearInterval(pLoop); alert("Time Up!"); }
                }, 1000);
            }
        }
        async function startPiP() {
            const o = document.getElementById('pomo-overlay');
            const pipW = await window.documentPictureInPicture.requestWindow({ width: 340, height: 400 });
            const s = document.createElement('style');
            s.textContent = Array.from(document.styleSheets[0].cssRules).map(r => r.cssText).join('');
            pipW.document.head.appendChild(s);
            pipW.document.body.append(o);
            pipW.addEventListener("pagehide", () => { document.body.append(o); o.style.display = 'none'; });
        }
    </script>
</body>
</html>
